<!DOCTYPE html>
<html>
<head>
  <title>AI Travel Bot 🤖</title>
  <link rel="stylesheet" href="mystyle.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #f0fff0, #e0f7fa);
    }
    .chat-box {
      width: 80%;
      margin: 30px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      max-height: 500px;
      overflow-y: auto;
    }
    .message {
      margin: 10px 0;
    }
    .user {
      color: #2196F3;
      font-weight: bold;
    }
    .bot {
      color: #4CAF50;
      font-style: italic;
    }
    #inputArea {
      text-align: center;
      margin-top: 20px;
    }
    #userInput {
      padding: 10px;
      width: 60%;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #aaa;
    }
    #sendBtn {
      padding: 10px 20px;
      margin-left: 10px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #sendBtn:hover {
      background: #45a049;
    }
  </style>
</head>

<body>
  <header>
     <center>
      <h1 style="color:#DFFF00; background: linear-gradient(to right,#33ccff 0%, #cc00ff 100%);">
        WANDERLUST TRAVEL GUIDE
      </h1>
    </center>
    <nav>
      <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="dest.html">Destinations</a></li>
        <li><a href="travelbot.html">AI Travel Bot 🤖</a></li>
        <li><a href="fooddrink.html">Food & Drink</a></li>
        <li><a href="accommodation.html">Accommodation</a></li>
         <li><a href="accommodationtips.html">Tips for Accommodation</a></li>
          <li><a href="favourites.html">Favourites</a></li>
           <li><a href="contactandhelp.html">Contact</a></li>
          <li><a href="submissions.html">Submissions</a></li> 
      </ul>
    </nav>
        </header>
  <h2 style="text-align:center; color:#2E8B57;">🧠 Ask the AI Travel Bot</h2>

  <div class="chat-box" id="chatBox">
    <!-- Messages will appear here -->
  </div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Ask me about any place..." />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chatBox = document.getElementById('chatBox');
      const userMsg = input.value.trim();
      if (!userMsg) return;

      chatBox.innerHTML += `<div class="message user">🧍 You: ${userMsg}</div>`;
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch('http://localhost:3000/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userMsg })
        });

        const data = await res.json();
        chatBox.innerHTML += `<div class="message bot">🤖 Bot: ${data.reply}</div>`;
      } catch (error) {
        chatBox.innerHTML += `<div class="message bot">❌ Bot: Sorry, I couldn’t respond. Try again later.</div>`;
        console.error('Fetch error:', error);
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
